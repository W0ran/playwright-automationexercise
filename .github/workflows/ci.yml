name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    # Закреплено на 22.04, а не ubuntu-latest (24.04/noble): на noble пакет libasound2
    # был переименован в libasound2t64, из-за чего Playwright --with-deps падает
    # с "Package 'libasound2' has no installation candidate". На 22.04 имя пакета
    # ещё актуально и установка системных зависимостей браузера проходит штатно.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"

      - name: Run tests
        run: mvn clean test

      - name: Generate Allure report
        if: always()
        run: |
          mvn io.qameta.allure:allure-maven:2.14.0:report || true

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          retention-days: 14

      - name: Upload Surefire test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 14